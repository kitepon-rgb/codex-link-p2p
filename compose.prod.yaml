# codex-link-p2p — 本番デプロイ overlay.
#
# 使い方 (本番サーバー、Linux ホスト想定):
#   docker compose -f compose.yaml -f compose.prod.yaml up -d --build
#
# 前提:
#   - DNS A レコード:
#       codex-link.kitepon.dynv6.net       → サーバー IP
#       codex-link-turn.kitepon.dynv6.net  → サーバー IP
#   - .env (本番値) を同ディレクトリに置く. example: .env.prod.example
#   - サーバーの 80 / 443 / 3478 (UDP+TCP) / 5349 (UDP+TCP) / 49152-65535/udp が開いている
#
# トポロジ:
#   iPhone / Mac Host
#         │
#         ├─ HTTPS+WSS  codex-link.kitepon.dynv6.net:443
#         │              └→ Caddy → relay:3000 (内部 network)
#         │
#         └─ TURN/TURNS codex-link-turn.kitepon.dynv6.net:3478 / :5349
#                        └→ coturn (host network mode)
#
# coturn の TLS cert は Caddy が ACME で発行したものを共有 volume 経由で参照する.

services:
  relay:
    # base compose.yaml の relay を本番向けに override.
    environment:
      CODEX_LINK_RELAY_URL: https://codex-link.kitepon.dynv6.net
      TURN_URLS: stun:stun.l.google.com:19302,turn:codex-link-turn.kitepon.dynv6.net:3478,turns:codex-link-turn.kitepon.dynv6.net:5349
    ports: !reset []  # 公開しない. Caddy 経由のみ.
    expose:
      - "3000"
    networks:
      - edge

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      RELAY_DOMAIN: codex-link.kitepon.dynv6.net
      TURN_DOMAIN: codex-link-turn.kitepon.dynv6.net
    depends_on:
      relay:
        condition: service_healthy
    networks:
      - edge
    restart: unless-stopped

  coturn:
    # 本番では Caddy 発行 cert を読みに行く必要があるので volume を追加.
    volumes:
      - ./services/relay/turn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - caddy_data:/caddy-data:ro
    environment:
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET:?TURN_SHARED_SECRET must be set}
      TURN_REALM: ${TURN_REALM:-codex-link-p2p.local}
      TURN_DOMAIN: codex-link-turn.kitepon.dynv6.net
      DETECT_EXTERNAL_IP: "yes"
      DETECT_RELAY_IP: "yes"
    # 本番向け command: TLS cert を Caddy のストレージから参照.
    # Caddy ACME (Let's Encrypt) 発行物の path:
    #   /caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/<DOMAIN>/<DOMAIN>.{crt,key}
    command: >
      -n
      --use-auth-secret
      --static-auth-secret=${TURN_SHARED_SECRET}
      --realm=${TURN_REALM:-codex-link-p2p.local}
      --listening-port=3478
      --tls-listening-port=5349
      --min-port=49152
      --max-port=65535
      --fingerprint
      --no-multicast-peers
      --no-cli
      --no-stdout-log
      --log-file=stdout
      --cert=/caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/codex-link-turn.kitepon.dynv6.net/codex-link-turn.kitepon.dynv6.net.crt
      --pkey=/caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/codex-link-turn.kitepon.dynv6.net/codex-link-turn.kitepon.dynv6.net.key

networks:
  edge:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
