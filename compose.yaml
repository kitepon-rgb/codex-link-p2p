# codex-link-p2p — Relay + coturn local / 本番 同居デプロイ.
#
# 起動例 (local 開発):
#   docker compose up --build relay coturn
#
# Relay は 127.0.0.1:3000 に bind (LAN 公開しない). 公開時は Caddy 等の
# reverse proxy で WSS 終端し、coturn は host network mode で 3478/5349 を
# 直接 listen する.

services:
  relay:
    build:
      context: .
      dockerfile: services/relay/Dockerfile
    environment:
      # === 必須 ===
      CODEX_LINK_RELAY_URL: ${CODEX_LINK_RELAY_URL:-http://127.0.0.1:3000}
      CODEX_LINK_HOST_BOOTSTRAP_TOKEN: ${CODEX_LINK_HOST_BOOTSTRAP_TOKEN:?CODEX_LINK_HOST_BOOTSTRAP_TOKEN must be set}
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET:?TURN_SHARED_SECRET must be set}
      # === TURN 設定 ===
      TURN_REALM: ${TURN_REALM:-codex-link-p2p.local}
      # NOTE: ICE servers として Mac Host / iPhone に配る URL.
      # 本番では turn:<your-host>:3478,turns:<your-host>:5349 を併記する.
      TURN_URLS: ${TURN_URLS:-stun:stun.l.google.com:19302,turn:127.0.0.1:3478}
      TURN_CREDENTIAL_TTL_SEC: ${TURN_CREDENTIAL_TTL_SEC:-300}
      # === オプション (rate / size limit はデフォルトで安全) ===
      PORT: "3000"
      MAX_HTTP_BODY_BYTES: ${MAX_HTTP_BODY_BYTES:-65536}
      MAX_WS_PAYLOAD_BYTES: ${MAX_WS_PAYLOAD_BYTES:-131072}
      PENDING_SIGNAL_TTL_MS: ${PENDING_SIGNAL_TTL_MS:-30000}
      PAIRING_CODE_TTL_MS: ${PAIRING_CODE_TTL_MS:-600000}
      RATE_TURN_CREDENTIAL_PER_MINUTE: ${RATE_TURN_CREDENTIAL_PER_MINUTE:-30}
      RATE_SIGNAL_FORWARD_PER_MINUTE: ${RATE_SIGNAL_FORWARD_PER_MINUTE:-600}
      RATE_PAIRING_CREATE_PER_MINUTE: ${RATE_PAIRING_CREATE_PER_MINUTE:-10}
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

  coturn:
    image: coturn/coturn:latest
    # ホストネットワークで listen する必要があるため network_mode: host.
    # (Linux 本番のみ. macOS Docker Desktop は host network 制約あり)
    network_mode: host
    volumes:
      - ./services/relay/turn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    environment:
      # Relay の TURN_SHARED_SECRET と **同じ値** を渡す.
      # coturn の `--static-auth-secret` に注入される.
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET:?TURN_SHARED_SECRET must be set}
      TURN_REALM: ${TURN_REALM:-codex-link-p2p.local}
      # external-ip は自動検出させる (DETECT_EXTERNAL_IP=yes).
      DETECT_EXTERNAL_IP: "yes"
      DETECT_RELAY_IP: "yes"
    command: >
      -n
      --use-auth-secret
      --static-auth-secret=${TURN_SHARED_SECRET}
      --realm=${TURN_REALM:-codex-link-p2p.local}
      --listening-port=3478
      --tls-listening-port=5349
      --min-port=49152
      --max-port=65535
      --fingerprint
      --no-multicast-peers
      --no-cli
      --no-stdout-log
      --log-file=stdout
    restart: unless-stopped
