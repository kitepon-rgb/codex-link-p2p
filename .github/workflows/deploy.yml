# codex-link-p2p — main へ push されたら kite サーバーへ自動デプロイ.
#
# 動作前提 (1 回だけセットアップ):
#   1. サーバー側:
#        sudo apt-get install -y docker.io docker-compose-plugin git
#        sudo usermod -aG docker $USER && newgrp docker
#        mkdir -p ~/codex-link-p2p && cd ~/codex-link-p2p
#        git clone https://github.com/kitepon-rgb/codex-link-p2p.git .
#        cp .env.prod.example .env && $EDITOR .env   # 本番値を埋める
#        docker compose -f compose.yaml -f compose.prod.yaml up -d --build
#   2. GitHub repo Secrets:
#        CODEX_LINK_DEPLOY_HOST   サーバーホスト名 (例: kitepon.dynv6.net)
#        CODEX_LINK_DEPLOY_USER   SSH ユーザー名 (例: kite)
#        CODEX_LINK_DEPLOY_KEY    SSH 秘密鍵 (PEM 形式. -----BEGIN OPENSSH... を含む全文)
#        CODEX_LINK_DEPLOY_DIR    サーバー側のチェックアウトディレクトリ (例: /home/kite/codex-link-p2p)
#
# その後、main への push がそのまま本番反映になる.

name: deploy

on:
  push:
    branches: [main]
    paths:
      - "services/relay/**"
      - "packages/protocol/**"
      - "compose.yaml"
      - "compose.prod.yaml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets are configured
        run: |
          missing=()
          [ -n "${{ secrets.CODEX_LINK_DEPLOY_HOST }}" ] || missing+=("CODEX_LINK_DEPLOY_HOST")
          [ -n "${{ secrets.CODEX_LINK_DEPLOY_USER }}" ] || missing+=("CODEX_LINK_DEPLOY_USER")
          [ -n "${{ secrets.CODEX_LINK_DEPLOY_KEY }}"  ] || missing+=("CODEX_LINK_DEPLOY_KEY")
          [ -n "${{ secrets.CODEX_LINK_DEPLOY_DIR }}"  ] || missing+=("CODEX_LINK_DEPLOY_DIR")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Set them in: Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Set up SSH
        env:
          DEPLOY_KEY: ${{ secrets.CODEX_LINK_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.CODEX_LINK_DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on remote (git pull + docker compose up)
        env:
          DEPLOY_USER: ${{ secrets.CODEX_LINK_DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.CODEX_LINK_DEPLOY_HOST }}
          DEPLOY_DIR:  ${{ secrets.CODEX_LINK_DEPLOY_DIR }}
        run: |
          ssh -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST" "
            set -euo pipefail
            cd '$DEPLOY_DIR'
            echo '[deploy] git fetch+reset to origin/main'
            git fetch --depth=1 origin main
            git reset --hard origin/main
            echo '[deploy] compose up'
            docker compose -f compose.yaml -f compose.prod.yaml up -d --build relay coturn
            echo '[deploy] reloading shared Caddy (license-server compose project)...'
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile || true
            echo '[deploy] waiting for relay to be healthy...'
            for i in \$(seq 1 30); do
              status=\$(docker compose -f compose.yaml -f compose.prod.yaml ps relay --format '{{.Health}}' || true)
              if [ \"\$status\" = healthy ]; then echo '[deploy] healthy'; exit 0; fi
              sleep 2
            done
            echo '[deploy] relay did not become healthy in 60s' >&2
            docker compose -f compose.yaml -f compose.prod.yaml logs --tail=50 relay >&2 || true
            exit 1
          "

      - name: Smoke /api/health (public endpoint)
        env:
          DEPLOY_HOST: ${{ secrets.CODEX_LINK_DEPLOY_HOST }}
        run: |
          # public URL は固定. DNS A は DEPLOY_HOST と同じサーバを指している前提.
          for i in $(seq 1 15); do
            if curl -fsS https://codex-link-p2p.kitepon.dynv6.net/api/health | grep -q '"ok":true'; then
              echo "[smoke] /api/health ok"
              exit 0
            fi
            sleep 2
          done
          echo "::error::/api/health did not return ok within 30s"
          exit 1
