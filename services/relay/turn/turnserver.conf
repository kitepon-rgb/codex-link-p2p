# coturn configuration for codex-link-p2p TURN server.
#
# 環境変数 (compose で渡す):
# - TURN_SHARED_SECRET: Relay と共有する HMAC-SHA1 secret
# - TURN_REALM: ドメイン名 (例: codex-link-p2p.local / codex-link-turn.kitepon.dynv6.net)
# - 本番 cert は Caddy 経由または /etc/coturn/certs/ にマウント
#
# Relay の `issueTurnCredential` が次の credential を発行:
#   username = "{unixExpiry}:{userId}"
#   password = base64(HMAC-SHA1(TURN_SHARED_SECRET, username))
# TTL は Relay 側で `turnCredentialTtlSec` (既定 300s) として管理。

listening-port=3478
tls-listening-port=5349

# REALM and authentication
use-auth-secret
# realm and static-auth-secret are injected via env at container startup
# (see compose.yaml entrypoint or override file)

# Fingerprint and security
fingerprint
no-multicast-peers
no-cli

# Port range for relay candidates
min-port=49152
max-port=65535

# Logging
log-file=stdout
verbose

# Disable legacy unauthenticated UDP transport
no-stdout-log

# Drop spurious traffic
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255
