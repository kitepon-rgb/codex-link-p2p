# coturn configuration for codex-link-p2p.
#
# このファイルは compose.yaml で /etc/coturn/turnserver.conf に mount される.
# Relay の `issueTurnCredential` (services/relay/src/turn.ts) が
#   username = "{unixExpirySec}:{userId}"
#   password = base64(HMAC-SHA1(TURN_SHARED_SECRET, username))
# を発行し、coturn は --use-auth-secret / --static-auth-secret で
# 同じ secret を使って検証する.
#
# 重要な値はすべて compose.yaml の `command:` から --flag 形式で上書きする
# (env 変数を直接 conf に書けないため). 本ファイルはハードコード可能な
# 静的設定のみ.

# Standard ports.
listening-port=3478
tls-listening-port=5349

# Auth: shared-secret モード (use-auth-secret) を compose 側で有効化.
# realm / static-auth-secret は compose の --flag から注入される.
# このファイル内で重複して書くと上書きが効かないことがあるためコメントアウト.
# realm=codex-link-p2p.local
# use-auth-secret
# static-auth-secret=<from-env>

# DTLS fingerprint (WebRTC 必須).
fingerprint

# multicast 拒否 (security hardening).
no-multicast-peers

# CLI off (telnet で turncli を開かせない).
no-cli

# Relay candidate のポート範囲.
min-port=49152
max-port=65535

# stdout logging only (Docker friendly).
no-stdout-log
log-file=stdout
verbose

# Drop spurious / RFC1918 等の peer IP.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# Cert paths (turns:). 本番では Caddy 経由で TLS 終端するか、
# /etc/coturn/certs/ にマウントする (compose.yaml で volumes 追加).
# cert=/etc/coturn/certs/cert.pem
# pkey=/etc/coturn/certs/privkey.pem
